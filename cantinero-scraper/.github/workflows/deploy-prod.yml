name: Build & deploy Python Scraper - Prod

on: workflow_dispatch

jobs:
    build:
        runs-on: [self-hosted, "cantinero-prod-1"]

        steps:
            - name: Checkout code
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: "Build docker image"
              run: docker compose build

            - name: "Stop and remove docker container"
              run: docker stop cantinero-scraper || true && docker rm cantinero-scraper || true

            - name: "Run docker container"
              run: docker compose up -d
